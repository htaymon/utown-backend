
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/utown?serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root1111}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

app.jwt.secret=${APP_JWT_SECRET:mydevsecretkey1234567890abcdef12345678}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}